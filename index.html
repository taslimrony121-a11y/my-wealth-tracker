<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wealth Tracker Cloud Ultra Pro</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
<style>
:root { --bg: #0b1120; --card: #1e293b; --accent: #facc15; --text: #e2e8f0; --green: #4ade80; }
body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; padding: 15px; margin: 0; }
.container { max-width: 1200px; margin: auto; }
h1 { text-align: center; color: var(--accent); cursor: pointer; margin-bottom: 20px; text-transform: uppercase; }

/* Crypto Cards */
.crypto-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
.crypto-card { background: #0f172a; padding: 15px; border-radius: 15px; border-left: 4px solid var(--accent); border: 1px solid #334155; }
.crypto-card b { display: block; color: var(--accent); margin-bottom: 5px; }
.price { font-size: 1.4rem; font-weight: bold; }

/* Dashboard */
.stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
.stat-card { background: var(--card); padding: 20px; border-radius: 15px; border: 1px solid #334155; text-align: center; }
.stat-card h2 { margin: 5px 0; font-size: 1.6rem; }

/* Goal Bar */
.goal-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #334155; }
.progress-bg { background: #0f172a; height: 12px; border-radius: 10px; margin: 10px 0; overflow: hidden; }
.progress-fill { background: var(--accent); height: 100%; width: 0%; transition: 0.5s; }

/* Admin Form */
#adminPanel { display: none; background: var(--card); padding: 20px; border-radius: 15px; margin-bottom: 20px; border: 2px solid var(--accent); }
.grid-form { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 10px; }
input, select { background: #0f172a; border: 1px solid #334155; padding: 12px; color: white; border-radius: 8px; width: 100%; box-sizing: border-box; }
button { background: var(--accent); border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; color: #0b1120; }

.platform-box { background: #0f172a; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
.history-item { border-bottom: 1px solid #334155; padding: 8px 0; display: flex; justify-content: space-between; font-size: 0.9rem; }
</style>
</head>
<body>

<div class="container">
<h1 onclick="adminLogin()">Wealth Tracker Ultra Pro</h1>

<div class="crypto-grid">
<div class="crypto-card" style="border-left-color: #f7931a;"><b>BTC/USDT</b><div class="price" id="btc-p">$0.00</div></div>
<div class="crypto-card" style="border-left-color: #627eea;"><b>ETH/USDT</b><div class="price" id="eth-p">$0.00</div></div>
<div class="crypto-card" style="border-left-color: #f3ba2f;"><b>BNB/USDT</b><div class="price" id="bnb-p">$0.00</div></div>
</div>

<div class="stat-grid">
<div class="stat-card">Total Invested<h2 id="totalVal">0</h2></div>
<div class="stat-card">Total Profit<h2 id="profitVal" style="color:var(--green)">0</h2></div>
<div class="stat-card">Active Assets<h2 id="activeCount">0</h2></div>
</div>

<div class="goal-card">
<div style="display:flex; justify-content:space-between; font-size:0.9rem;">
<span>Goal: 3,00,000 BDT</span>
<span id="goalPercent">0%</span>
</div>
<div class="progress-bg"><div id="goalFill" class="progress-fill"></div></div>
<small id="goalRem">Remaining: 0 BDT</small>
</div>

<div id="adminPanel">
<h3>Manage Investment</h3>
<input type="hidden" id="docId">
<div class="grid-form">
<select id="plat">
<option value="Binance">Binance</option>
<option value="Wegro">Wegro</option>
<option value="Biniyog">Biniyog</option>
<option value="iFarmer">iFarmer</option>
<option value="Islami Bank (MSSA)">Islami Bank (MSSA)</option>
<option value="Other">Other</option>
</select>
<select id="type">
<option value="BTC">BTC</option>
<option value="ETH">ETH</option>
<option value="BNB">BNB</option>
<option value="Agriculture">Agriculture</option>
<option value="MSSA Installment">MSSA Installment</option>
<option value="Shop/Business">Shop/Business</option>
<option value="Gold">Gold</option>
</select>
<input type="number" id="amt" placeholder="Amount / Qty">
<input type="number" id="prof" placeholder="Profit Amount">
<input type="date" id="sDate">
<input type="date" id="eDate">
</div>
<button id="saveBtn" onclick="saveToCloud()" style="margin-top:15px;">Save to Cloud</button>
<button id="updateBtn" style="display:none; background:var(--green);" onclick="updateExisting()">Update Changes</button>
<button id="cancelBtn" style="display:none; background:#ef4444; color:white; margin-top:5px;" onclick="resetForm()">Cancel</button>
</div>

<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px;">
<div class="stat-card" style="text-align: left;">
<h3>Portfolio View</h3>
<div id="portfolioList">Connecting...</div>
</div>
<div class="stat-card" style="text-align: left;">
<h3>Withdraw History</h3>
<div id="withdrawList">No history.</div>
</div>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyB0Q2k9tyjJZpBDFRZSPJ3H1Sq_0ZW1MbY",
authDomain: "mywealthtracker-b7f62.firebaseapp.com",
projectId: "mywealthtracker-b7f62",
storageBucket: "mywealthtracker-b7f62.firebasestorage.app",
messagingSenderId: "575029483834",
appId: "1:575029483834:web:bf597767177d37fdff5803"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const invCol = collection(db, "investments");

let investments = [];
let isAdmin = false;

// Live Prices
async function fetchPrices() {
try {
const res = await fetch('https://api.binance.com/api/v3/ticker/price?symbols=["BTCUSDT","ETHUSDT","BNBUSDT"]');
const data = await res.json();
data.forEach(c => {
const p = parseFloat(c.price).toLocaleString();
if(c.symbol === "BTCUSDT") document.getElementById('btc-p').innerText = "$" + p;
if(c.symbol === "ETHUSDT") document.getElementById('eth-p').innerText = "$" + p;
if(c.symbol === "BNBUSDT") document.getElementById('bnb-p').innerText = "$" + p;
});
} catch(e) {}
}
setInterval(fetchPrices, 10000);
fetchPrices();

window.adminLogin = () => {
if(prompt("Password:") === "1234") {
isAdmin = true;
document.getElementById('adminPanel').style.display = 'block';
render();
}
}

window.saveToCloud = async () => {
const data = {
platform: document.getElementById('plat').value,
type: document.getElementById('type').value,
amount: parseFloat(document.getElementById('amt').value) || 0,
profit: parseFloat(document.getElementById('prof').value) || 0,
startDate: document.getElementById('sDate').value,
endDate: document.getElementById('eDate').value,
status: 'active'
};
await addDoc(invCol, data);
resetForm();
}

onSnapshot(invCol, (snap) => {
investments = snap.docs.map(d => ({ id: d.id, ...d.data() }));
render();
});

function render() {
const active = investments.filter(i => i.status === 'active');
const total = active.reduce((s, i) => s + i.amount, 0);
const profit = active.reduce((s, i) => s + i.profit, 0);

document.getElementById('totalVal').innerText = total.toLocaleString() + " BDT";
document.getElementById('profitVal').innerText = profit.toLocaleString() + " BDT";
document.getElementById('activeCount').innerText = active.length;

// Goal
const prog = Math.min((total / 300000) * 100, 100).toFixed(1);
document.getElementById('goalFill').style.width = prog + "%";
document.getElementById('goalPercent').innerText = prog + "%";
document.getElementById('goalRem').innerText = "Remaining: " + (300000 - total).toLocaleString() + " BDT";

// Portfolio
document.getElementById('portfolioList').innerHTML = active.map(i => `
<div class="platform-box">
<b>${i.platform}</b> (${i.type})<br>
Amt: ${i.amount.toLocaleString()} | <span style="color:var(--green)">+${i.profit}</span>
${isAdmin ? `<div style="margin-top:10px;"><button onclick="editItem('${i.id}')" style="width:auto; padding:4px 10px; font-size:12px;">Edit</button> <button onclick="deleteItem('${i.id}')" style="width:auto; padding:4px 10px; font-size:12px; background:#ef4444; color:white;">Del</button></div>` : ''}
</div>
`).join('');

// History (Simplified)
document.getElementById('withdrawList').innerHTML = investments.filter(i => i.profit > 0).map(i => `
<div class="history-item"><span>${i.platform}</span><span style="color:var(--green)">+${i.profit}</span></div>
`).join('');
}

window.editItem = (id) => {
const i = investments.find(item => item.id === id);
document.getElementById('docId').value = id;
document.getElementById('plat').value = i.platform;
document.getElementById('type').value = i.type;
document.getElementById('amt').value = i.amount;
document.getElementById('prof').value = i.profit;
document.getElementById('sDate').value = i.startDate;
document.getElementById('eDate').value = i.endDate;
document.getElementById('saveBtn').style.display = 'none';
document.getElementById('updateBtn').style.display = 'block';
document.getElementById('cancelBtn').style.display = 'block';
window.scrollTo(0,0);
}

window.updateExisting = async () => {
const id = document.getElementById('docId').value;
await updateDoc(doc(db, "investments", id), {
platform: document.getElementById('plat').value,
type: document.getElementById('type').value,
amount: parseFloat(document.getElementById('amt').value),
profit: parseFloat(document.getElementById('prof').value),
startDate: document.getElementById('sDate').value,
endDate: document.getElementById('eDate').value
});
resetForm();
}

window.deleteItem = async (id) => { if(confirm("Delete?")) await deleteDoc(doc(db, "investments", id)); }

window.resetForm = () => {
document.getElementById('docId').value = '';
document.getElementById('saveBtn').style.display = 'block';
document.getElementById('updateBtn').style.display = 'none';
document.getElementById('cancelBtn').style.display = 'none';
}
</script>
</body>
</html>
