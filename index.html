<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Wealth Tracker Pro | Admin Mode</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
:root {
--bg-dark: #0b1120; --card-bg: #1e293b; --input-bg: #0f172a;
--accent: #facc15; --text-main: #e2e8f0; --text-sub: #94a3b8;
--profit-color: #4ade80; --btc-color: #f7931a; --eth-color: #627eea; --bnb-color: #f3ba2f;
}
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
body { background: var(--bg-dark); color: var(--text-main); padding: 15px; }
.container { max-width: 1200px; margin: 0 auto; }
h1 { text-align: center; margin-bottom: 20px; color: var(--accent); }
.dashboard-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-bottom: 20px; }
.stat-card { background: var(--card-bg); border-radius: 15px; padding: 15px; border: 1px solid #334155; }
.stat-label { font-size: 0.75rem; color: var(--text-sub); font-weight: bold; }
.stat-value { font-size: 1.5rem; font-weight: 800; margin-top: 5px; }
.crypto-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; margin-bottom: 20px; }
.crypto-card { background: var(--input-bg); border-radius: 15px; padding: 15px; border-left: 4px solid var(--accent); }
.card { background: var(--card-bg); border-radius: 15px; padding: 20px; margin-bottom: 20px; border: 1px solid #334155; }
.form-row { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 10px; }
.input-group { flex: 1; min-width: 140px; display: flex; flex-direction: column; gap: 5px; }
input, select { background: var(--input-bg); border: 1px solid #334155; padding: 10px; border-radius: 8px; color: white; }
button { border: none; padding: 10px 15px; border-radius: 8px; font-weight: bold; cursor: pointer; display: flex; align-items: center; gap: 5px; }
.btn-save { background: var(--accent); color: #000; width: 100%; justify-content: center; margin-top: 10px; }
.btn-action { background: #334155; color: #fff; font-size: 0.7rem; }
.btn-withdraw { background: #4ade80; color: #000; font-size: 0.7rem; }
.platform-box { background: var(--input-bg); padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 4px solid var(--accent); }
.status-badge { font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; text-transform: uppercase; margin-left: 5px; }
.status-active { background: #4ade8022; color: #4ade80; border: 1px solid #4ade80; }
.status-completed { background: #94a3b822; color: #94a3b8; border: 1px solid #94a3b8; }
#adminPanel { display: none; } /* Admin form hidden by default */
</style>
</head>
<body>

<div class="container">
<h1>Wealth Tracker Pro <small style="font-size: 0.5em; color: gray;">(Press 'A' for Admin)</small></h1>

<div class="crypto-grid">
<div class="crypto-card" style="border-color: var(--btc-color);">
<div style="color:var(--btc-color); font-weight:bold;">BTC/USDT</div>
<div id="p-BTC" class="stat-value">$0.00</div>
</div>
<div class="crypto-card" style="border-color: var(--eth-color);">
<div style="color:var(--eth-color); font-weight:bold;">ETH/USDT</div>
<div id="p-ETH" class="stat-value">$0.00</div>
</div>
<div class="crypto-card" style="border-color: var(--bnb-color);">
<div style="color:var(--bnb-color); font-weight:bold;">BNB/USDT</div>
<div id="p-BNB" class="stat-value">$0.00</div>
</div>
</div>

<div class="dashboard-grid">
<div class="stat-card"><div class="stat-label">Total Principal</div><div id="totalPrincipal" class="stat-value">0</div></div>
<div class="stat-card"><div class="stat-label">Active Investment</div><div id="activeInvestment" class="stat-value" style="color:var(--accent)">0</div></div>
<div class="stat-card"><div class="stat-label">Portfolio Value</div><div id="currentValue" class="stat-value" style="color:var(--profit-color)">0</div></div>
</div>

<div id="adminPanel" class="card">
<h3>Add New Investment</h3>
<div class="form-row">
<div class="input-group"><label>Platform</label><select id="plat"><option>Binance</option><option>Wegro</option><option>Biniyog</option><option>iFarmer</option><option>Islami Bank (MSSA)</option><option>Other</option></select></div>
<div class="input-group"><label>Type</label><select id="type"><option value="BTC">BTC</option><option value="ETH">ETH</option><option value="BNB">BNB</option><option>Agriculture</option><option>Business</option><option>Gold</option></select></div>
<div class="input-group"><label>Amount</label><input type="number" id="amt" step="any"></div>
<div class="input-group"><label>Status</label><select id="status"><option value="active">Active</option><option value="completed">Completed</option></select></div>
</div>
<div class="form-row">
<div class="input-group"><label>Start Date</label><input type="date" id="sDate"></div>
<button class="btn-save" onclick="addEntry()">Save Investment</button>
</div>
</div>

<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 15px; margin-top: 20px;">
<div class="card"><h2>Portfolio</h2><div id="portfolioList"></div></div>
<div class="card"><h2>Monthly Profit</h2><div style="height:250px"><canvas id="monthlyChart"></canvas></div></div>
</div>
</div>

<script>
let investments = [];
let isAdmin = false;
const STORAGE_KEY = "wealth_final_v11_mssa";

// Admin Lock System
window.addEventListener('keydown', (e) => {
if (e.key.toLowerCase() === 'a') {
const pass = prompt("Enter Admin Password:");
if (pass === "1234") { // Change your password here
isAdmin = true;
document.getElementById('adminPanel').style.display = 'block';
alert("Admin Mode Active!");
renderAll();
}
}
});

async function updateCrypto() {
try {
const res = await fetch(`https://api.binance.com/api/v3/ticker/price`);
const data = await res.json();
['BTC','ETH','BNB'].forEach(coin => {
const p = data.find(x => x.symbol === coin+'USDT');
if(p) document.getElementById(`p-${coin}`).innerText = `$${parseFloat(p.price).toLocaleString()}`;
});
} catch (e) {}
}

function addEntry() {
const inv = {
id: Date.now(),
platform: document.getElementById('plat').value,
type: document.getElementById('type').value,
amount: parseFloat(document.getElementById('amt').value),
profit: 0,
status: document.getElementById('status').value,
start: document.getElementById('sDate').value
};
if(!inv.amount) return;
investments.push(inv);
saveAndRender();
}

function renderStats() {
const principal = investments.reduce((s, i) => s + i.amount, 0);
const active = investments.filter(i => i.status === 'active').reduce((s, i) => s + i.amount, 0);
document.getElementById('totalPrincipal').innerText = principal.toLocaleString();
document.getElementById('activeInvestment').innerText = active.toLocaleString();
document.getElementById('currentValue').innerText = (principal).toLocaleString();
}

function renderPortfolio() {
const container = document.getElementById('portfolioList');
const map = {};
investments.forEach(i => { if(!map[i.platform]) map[i.platform] = []; map[i.platform].push(i); });

let html = '';
for(let p in map) {
let items = '';
map[p].forEach(i => {
const isComp = i.status === 'completed';
items += `
<div style="border-bottom:1px solid #334155; padding:8px 0; display:flex; justify-content:space-between; align-items:center; opacity:${isComp?0.5:1}">
<div><b>${i.type}</b> <span class="status-badge ${isComp?'status-completed':'status-active'}">${i.status}</span><br><small>${i.amount.toLocaleString()} BDT</small></div>
${isAdmin ? `
<div style="display:flex; gap:5px;">
${!isComp ? `<button class="btn-withdraw" onclick="withdrawInv(${i.id})"><i class="fas fa-check"></i></button>` : ''}
<button class="btn-action" onclick="deleteInv(${i.id})"><i class="fas fa-trash"></i></button>
</div>
` : ''}
</div>`;
});
html += `<div class="platform-box"><b>${p}</b>${items}</div>`;
}
container.innerHTML = html || "No data.";
}

function withdrawInv(id) {
const inv = investments.find(i => i.id === id);
if(inv) {
inv.status = 'completed';
const history = JSON.parse(localStorage.getItem("withdraw_history") || "[]");
history.push({...inv, date: new Date().toISOString().slice(0,10)});
localStorage.setItem("withdraw_history", JSON.stringify(history));
saveAndRender();
}
}

function deleteInv(id) {
if(confirm("Delete?")) { investments = investments.filter(i => i.id !== id); saveAndRender(); }
}

let mChart = null;
function renderMonthlyChart() {
const ctx = document.getElementById('monthlyChart').getContext('2d');
if(mChart) mChart.destroy();
const history = JSON.parse(localStorage.getItem("withdraw_history") || "[]");
const monthly = {};
history.forEach(h => { const m = h.date.slice(0,7); monthly[m] = (monthly[m] || 0) + h.amount; });
mChart = new Chart(ctx, { type: 'bar', data: { labels: Object.keys(monthly), datasets: [{ label: 'Withdraws', data: Object.values(monthly), backgroundColor: '#4ade80' }] }, options: { responsive: true, maintainAspectRatio: false } });
}

function saveAndRender() { localStorage.setItem(STORAGE_KEY, JSON.stringify(investments)); renderAll(); }
function renderAll() { renderStats(); renderPortfolio(); renderMonthlyChart(); updateCrypto(); }
function load() {
const d = localStorage.getItem(STORAGE_KEY);
if(d) investments = JSON.parse(d);
document.getElementById('sDate').value = new Date().toISOString().slice(0,10);
renderAll();
}
setInterval(updateCrypto, 30000);
load();
</script>
</body>
</html>
